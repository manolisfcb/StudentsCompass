<header class="company-header">
  <nav class="company-nav">
    <div class="container">
      <a class="company-brand" href="/company-dashboard" aria-label="StudentsCompass company dashboard">
        <img src="/static/images/Logo_Ready_to_Use.png" alt="StudentsCompass logo" style="height:64px; width:auto; display:block;" />
        <span class="company-badge">Company</span>
      </a>

      <button id="company-mobile-menu-toggle" class="mobile-menu-toggle company-menu-toggle" aria-label="Toggle company navigation">☰</button>

      <ul id="company-mobile-menu">
        <li>
          <a href="/company-dashboard" class="nav-btn nav-btn-primary {{ 'active' if request.url.path == '/company-dashboard' else '' }}">
            Dashboard
          </a>
        </li>
        <li>
          <a href="/company-dashboard#job-list" class="nav-btn nav-btn-primary">
            Job Postings
          </a>
        </li>
        <li>
          <a href="/company-dashboard" class="nav-btn nav-btn-primary">
            Applications
          </a>
        </li>
        <li>
          <a href="#" id="company-logout-link" class="nav-btn nav-btn-logout">
            Logout
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>

<style>
  .company-header {
    background: linear-gradient(110deg, #0f172a 0%, #1d4ed8 52%, #0ea5e9 100%);
    color: #fff;
    border-bottom: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.24);
  }

  .company-nav {
    padding: 0.75rem 0;
  }

  .company-brand {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
  }

  .company-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.25rem 0.65rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #dbeafe;
    border: 1px solid rgba(219, 234, 254, 0.35);
    background: rgba(15, 23, 42, 0.35);
  }

  .company-header .nav-btn-primary {
    border-color: rgba(219, 234, 254, 0.45) !important;
    background: rgba(15, 23, 42, 0.2) !important;
  }

  .company-header .nav-btn-primary.active,
  .company-header .nav-btn-primary:hover {
    border-color: rgba(255, 255, 255, 0.75) !important;
    background: rgba(255, 255, 255, 0.18) !important;
  }

  @media (max-width: 968px) {
    .company-menu-toggle {
      background: rgba(15, 23, 42, 0.42);
      border-color: rgba(219, 234, 254, 0.45);
      color: #fff;
    }

    .company-header #company-mobile-menu {
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.98) 0%, rgba(30, 64, 175, 0.98) 100%);
    }
  }

  @media (max-width: 640px) {
    .company-brand img {
      height: 56px !important;
    }

    .company-badge {
      display: none;
    }
  }
</style>

<script>
  (() => {
    const logoutLink = document.getElementById('company-logout-link');
    if (logoutLink) {
      logoutLink.addEventListener('click', async (e) => {
        e.preventDefault();

        const modal = document.createElement('div');
        modal.className = 'logout-modal';
        modal.innerHTML = `
          <div class="logout-modal-content">
            <div class="logout-modal-header">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FB7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </div>
            <h2>See you later!</h2>
            <p>Are you sure you want to log out?</p>
            <div class="logout-modal-buttons">
              <button class="logout-btn-cancel">Cancel</button>
              <button class="logout-btn-confirm">Log Out</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        requestAnimationFrame(() => {
          modal.classList.add('active');
        });

        const cancelBtn = modal.querySelector('.logout-btn-cancel');
        const confirmBtn = modal.querySelector('.logout-btn-confirm');

        cancelBtn.addEventListener('click', () => {
          modal.classList.remove('active');
          setTimeout(() => modal.remove(), 300);
        });

        confirmBtn.addEventListener('click', async () => {
          modal.classList.add('logging-out');
          try {
            await Promise.allSettled([
              fetch('/api/v1/auth/company/logout', {
                method: 'POST',
                credentials: 'include',
              }),
              fetch('/auth/jwt/logout', {
                method: 'POST',
                credentials: 'include',
              }),
            ]);
          } catch (err) {
            console.error('Logout error:', err);
          } finally {
            try {
              localStorage.removeItem('bearer_token');
              localStorage.removeItem('company_token');
              localStorage.removeItem('account_type');
            } catch (_) {}
            window.location.href = '/login';
          }
        });

        modal.addEventListener('click', (event) => {
          if (event.target === modal) {
            modal.classList.remove('active');
            setTimeout(() => modal.remove(), 300);
          }
        });
      });
    }

    const menuToggle = document.getElementById('company-mobile-menu-toggle');
    const mobileMenu = document.getElementById('company-mobile-menu');

    if (menuToggle && mobileMenu) {
      menuToggle.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
      });

      document.addEventListener('click', (event) => {
        if (!mobileMenu.contains(event.target) && !menuToggle.contains(event.target)) {
          mobileMenu.classList.remove('active');
        }
      });
    }
  })();
</script>
